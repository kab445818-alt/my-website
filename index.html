<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>بوابة طرب الرسمية</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #050505;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* =========================
           الخلفية السينمائية
        ========================== */

        .background-scene {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -5;
            background: #020202;
        }

        /* السماء */

        .dark-sky {
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(to bottom,
                    #010101 0%,
                    #050505 35%,
                    #0b0b0b 70%,
                    #111111 100%);
        }

        /* الغيوم */

        .cloud-layer {
            position: absolute;
            width: 220%;
            height: 45%;
            opacity: .15;
            filter: blur(45px);
        }

        .cloud1 {
            top: -10%;
            left: -50%;
            background:
                radial-gradient(circle,
                    rgba(255, 255, 255, .8) 0%,
                    transparent 60%);
            animation: cloudMove 50s linear infinite;
        }

        .cloud2 {
            top: 5%;
            left: -30%;
            background:
                radial-gradient(circle,
                    rgba(120, 120, 120, .7) 0%,
                    transparent 60%);
            animation: cloudMove2 70s linear infinite;
        }

        /* البرق */

        .lightning {
            position: absolute;
            width: 3px;
            height: 65%;
            top: 8%;
            opacity: 0;
            background: white;
            filter:
                drop-shadow(0 0 10px white) drop-shadow(0 0 30px white);
        }

        .lightning1 {
            left: 28%;
            transform: skewX(-10deg);
            animation: flash1 8s infinite;
        }

        .lightning2 {
            right: 25%;
            transform: skewX(10deg);
            animation: flash2 11s infinite;
        }

        /* وميض السماء */

        .sky-flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            animation: skyFlash 8s infinite;
        }

        /* الضباب */

        .fog {
            position: absolute;
            bottom: 18%;
            width: 100%;
            height: 20%;
            background:
                linear-gradient(to top,
                    rgba(255, 255, 255, .06),
                    transparent);
            filter: blur(20px);
            animation: fogMove 12s ease-in-out infinite alternate;
        }

        /* البحيرة */

        .lake {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 28%;
            background:
                linear-gradient(to bottom,
                    #040404,
                    #000000);
            overflow: hidden;
        }

        .lake::before {
            content: '';
            position: absolute;
            inset: 0;

            background:
                repeating-radial-gradient(circle at 50% 100%,
                    rgba(255, 255, 255, .03),
                    rgba(255, 255, 255, .01) 2%,
                    transparent 4%);

            animation: waterMove 8s linear infinite;
        }

        /* انعكاس البرق */

        .lake-reflection {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 28%;
            background:
                linear-gradient(to top,
                    rgba(255, 255, 255, .08),
                    transparent);

            opacity: 0;
            animation: reflectionFlash 8s infinite;
        }

        /* الرجل الجالس */

        .lonely-man {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            width: 65px;
            height: 140px;
            opacity: .95;
        }

        .head {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: black;
            margin: auto;
        }

        .body {
            width: 20px;
            height: 75px;
            background: black;
            margin: 6px auto;
            border-radius: 20px;
            position: relative;
        }

        .body::before,
        .body::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 50px;
            background: black;
            bottom: -22px;
            border-radius: 20px;
        }

        .body::before {
            left: -10px;
            transform: rotate(20deg);
        }

        .body::after {
            right: -10px;
            transform: rotate(-20deg);
        }

        /* =========================
           الصندوق الرئيسي
        ========================== */

        .container {
            width: 90%;
            max-width: 550px;
            padding: 40px 30px;
            border-radius: 15px;

            background:
                rgba(0, 0, 0, 0.55);

            backdrop-filter: blur(20px);

            border:
                1px solid rgba(255, 255, 255, .08);

            box-shadow:
                0 0 40px rgba(0, 0, 0, .8);

            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 5px 16px;
            border-radius: 6px;
            background:
                rgba(255, 255, 255, .05);

            border:
                1px solid rgba(255, 255, 255, .1);

            font-size: 14px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 15px;
            font-weight: 800;
        }

        p {
            color: #cfcfcf;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .btn {
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;

            background:
                linear-gradient(135deg,
                    #ffffff,
                    #d9d9d9);

            color: black;

            transition: .25s;
        }

        .btn:hover {
            transform: translateY(-3px);

            box-shadow:
                0 0 20px rgba(255, 255, 255, .25);
        }

        /* =========================
           الانميشن
        ========================== */

        @keyframes cloudMove {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-20%);
            }
        }

        @keyframes cloudMove2 {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-15%);
            }
        }

        @keyframes flash1 {

            0%,
            92%,
            100% {
                opacity: 0;
            }

            93% {
                opacity: 1;
            }

            94% {
                opacity: .2;
            }

            95% {
                opacity: 1;
            }
        }

        @keyframes flash2 {

            0%,
            95%,
            100% {
                opacity: 0;
            }

            96% {
                opacity: 1;
            }

            97% {
                opacity: .3;
            }
        }

        @keyframes reflectionFlash {

            0%,
            92%,
            100% {
                opacity: 0;
            }

            93%,
            95% {
                opacity: 1;
            }
        }

        @keyframes skyFlash {

            0%,
            92%,
            100% {
                opacity: 0;
            }

            93% {
                opacity: .12;
            }

            95% {
                opacity: .2;
            }
        }

        @keyframes fogMove {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-12px);
            }
        }

        @keyframes waterMove {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-40px);
            }
        }
    </style>
</head>

<body>

    <!-- الخلفية -->

    <div class="background-scene">

        <div class="dark-sky"></div>

        <div class="sky-flash"></div>

        <div class="cloud-layer cloud1"></div>
        <div class="cloud-layer cloud2"></div>

        <div class="lightning lightning1"></div>
        <div class="lightning lightning2"></div>

        <div class="fog"></div>

        <div class="lake"></div>

        <div class="lake-reflection"></div>

        <!-- الرجل -->

        <div class="lonely-man">
            <div class="head"></div>
            <div class="body"></div>
        </div>

    </div>

    <!-- المحتوى -->

    <div class="container">

        <div class="badge">
            ⚔️ البوابة الرسمية
        </div>

        <h1>بوابة طرب</h1>

        <p>
            مرحباً بك في النظام الرسمي لتقديمات طرب.<br>
            التقديم متاح فقط للأشخاص القادرين على تحمل المسؤولية الكاملة.
        </p>

        <button class="btn">
            ابدأ التقديم
        </button>

    </div>

</body>

</html>
