<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع طرب للتقديم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070509;
            --purple-main: #8b5cf6;
            --purple-glow: rgba(139, 92, 246, 0.4);
            --text-light: #f3f4f6;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تأثير الضباب المتحرك في الخلفية */
        .background-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.2), transparent 40%),
                        radial-gradient(circle at 70% 70%, rgba(76, 29, 149, 0.25), transparent 45%);
            filter: blur(60px);
            animation: pulseGlow 10s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0px, 0px); }
            100% { transform: scale(1.1) translate(20px, -20px); }
        }

        /* الحاوية الرئيسية للمحتوى */
        .container {
            background: rgba(15, 11, 22, 0.75);
            border: 1px solid rgba(139, 92, 246, 0.2);
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 650px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 0 30px var(--purple-glow);
            text-align: center;
            position: relative;
        }

        /* التحكم في ظهور الشاشات */
        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 0 15px var(--purple-main);
            margin-bottom: 15px;
        }

        p {
            color: #a78bfa;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* الأزرار الاحترافية */
        .btn {
            background: linear-gradient(135deg, var(--purple-main), #6d28d9);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }

        .btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* تنسيق المدخلات والقوانين */
        .content-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(139, 92, 246, 0.1);
            padding: 15px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            text-align: right;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .form-group {
            text-align: right;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #c084fc;
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(7, 5, 9, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: white;
            border-radius: 6px;
            outline: none;
            font-size: 1rem;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--purple-main);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
        }

        /* خانة الإقرار */
        .acknowledgement-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(239, 68, 68, 0.05);
            border: 1px dashed rgba(239, 68, 68, 0.3);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: right;
        }

        /* حالة النتيجة (قبول / رفض) */
        .status-screen {
            padding: 30px;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: 800;
        }
        .status-screen.accepted {
            border: 2px solid var(--accent-green);
            background: rgba(34, 197, 94, 0.1);
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.4);
            color: var(--accent-green);
        }
        .status-screen.rejected {
            border: 2px solid var(--accent-red);
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.4);
            color: var(--accent-red);
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">
        
        <div id="pageWelcome" class="page active">
            <h1>طرب</h1>
            <p>مرحباً بك في بوابة تقديم الإدارة الخاصة بـ طرب.</p>
            <button class="btn" onclick="navigateTo('pageApply')">ابدأ التقديم</button>
        </div>

        <div id="pageApply" class="page">
            <h2 style="margin-bottom: 20px; color: #fff;">نموذج التقديم الالكتروني</h2>
            
            <div class="form-group">
                <label>القوانين والشروط العامة:</label>
                <div class="content-box">
                    1. [سيتم استبدال هذا النص بالقوانين التي سترسلها]<br>
                    2. الالتزام التام بالسرية الإدارية.<br>
                    3. التواجد اليومي والتفاعل المستمر.
                </div>
            </div>

            <form id="appForm" onsubmit="submitApplication(event)">
                <div class="form-group">
                    <label for="userRank">اختر الرتبة التي تود التقديم عليها:</label>
                    <select id="userRank" required onchange="handleRankChange()">
                        <option value="" disabled selected>اختر من هنا...</option>
                        <option value="mod">مشرف ساحة</option>
                        <option value="support">دعم فني</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>شروط الرتبة المحددة:</label>
                    <div id="rankConditions" class="content-box" style="height: 80px; color: #a78bfa;">
                        يرجى اختيار رتبة أولاً لرؤية الشروط..
                    </div>
                </div>

                <div class="form-group">
                    <label>الأسئلة الإدارية:</label>
                    <textarea id="rankQuestions" required placeholder="[هنا ستظهر الأسئلة بناءً على رتبتك لتجيب عليها...]"></textarea>
                </div>

                <div class="acknowledgement-box">
                    <input type="checkbox" id="agreeCheck" onchange="toggleSubmitBtn()">
                    <label for="agreeCheck" style="font-size: 0.9rem; color: #fca5a5; cursor: pointer;">
                        [الإقرار الإلزامي: أقر أنا مقدم الطلب بالالتزام بكافة الشروط المذكورة أعلاه]
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="btn" style="width: 100%;" disabled>تقديم الطلب</button>
            </form>
        </div>

        <div id="pageStatus" class="page">
            <div id="statusBox" class="status-screen">
                </div>
            <button class="btn" style="margin-top: 20px; font-size: 1rem; padding: 8px 20px;" onclick="navigateTo('pageWelcome')">العودة للرئيسية</button>
        </div>

    </div>

    <script>
        // دالة التنقل بين الشاشات
        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // تغيير الشروط والأسئلة بناءً على الرتبة المختار
        function handleRankChange() {
            const rank = document.getElementById('userRank').value;
            const conditionsDiv = document.getElementById('rankConditions');
            const questionsTextArea = document.getElementById('rankQuestions');

            if(rank === 'mod') {
                conditionsDiv.innerText = "شروط المشرف: عمرك فوق 18، خبرة سابقة في التعامل مع المشاكل.";
                questionsTextArea.placeholder = "س1: كيف تتصرف إذا قام إداري آخر بمخالفة القوانين؟";
            } else if(rank === 'support') {
                conditionsDiv.innerText = "شروط الدعم: سرعة الرد، أسلوب لبق، التواجد في نظام التذاكر.";
                questionsTextArea.placeholder = "س1: ما هي خبرتك السابقة في الدعم الفني؟";
            }
        }

        // تفعيل زر التقديم فقط إذا تم الضغط على checkbox الإقرار
        function toggleSubmitBtn() {
            const checkBox = document.getElementById('agreeCheck');
            document.getElementById('submitBtn').disabled = !checkBox.checked;
        }

        // محاكاة إرسال الطلب (هنا نربط الـ Webhook مستقبلاً)
        function submitApplication(event) {
            event.preventDefault();
            
            // لإظهار كيف ستعمل لوحة التحكم الخاصة بك (القبول والرفض والنور المتحرك):
            // سنقوم بعمل محاكاة تجريبية (تظهر لك كيف يبدو شكل القبول والرفض بالموقع)
            
            let choice = confirm("محاكاة تحكم صاحب الموقع (أنت):\nاضغط [OK] للمحاكاة كـ (مقبول - نور أخضر)\nاضغط [Cancel] للمحاكاة كـ (مرفوض - نور أحمر)");
            
            const statusBox = document.getElementById('statusBox');
            if(choice) {
                statusBox.className = "status-screen accepted";
                statusBox.innerHTML = "🟢 نعتز باختيارك!<br><br>لقد تم قبولك في طرب، سيتم التواصل معك قريباً.";
            } else {
                statusBox.className = "status-screen rejected";
                statusBox.innerHTML = "🔴 نعتذر منك...<br><br>تم رفض طلبك حالياً، ولكن يمكنك المحاولة والتقديم مرة أخرى لاحقاً.";
            }
            
            navigateTo('pageStatus');
            document.getElementById('appForm').reset();
            toggleSubmitBtn();
        }
    </script>
</body>
</html>
